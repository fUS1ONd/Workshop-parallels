name: CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - name: Тесты
        run: ./gradlew test
